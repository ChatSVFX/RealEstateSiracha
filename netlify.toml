[build]
  publish = "."

[[headers]]
  for = "*.html"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "Build/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "Build/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "Build/*.data"
  [headers.values]
    Content-Type = "application/octet-stream"

[[headers]]
  for = "Build/*.js"
  [headers.values]
    Content-Type = "application/javascript"