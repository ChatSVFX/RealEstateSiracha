[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "Build/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "Build/*.data"
  [headers.values]
    Content-Type = "application/octet-stream"